# OmicGraph — local dev stack.
#
# Typical workflow (see 03_structure.md):
#   docker compose up neo4j -d      # only Neo4j runs in Docker for dev
#   uvicorn backend.main:app --reload
#   cd frontend && npm run dev
#
# The `backend` and `frontend` services are defined for a full containerized
# run (`docker compose up`). For day-to-day development only `neo4j` is needed.

services:
  neo4j:
    image: neo4j:5
    container_name: omicgraph-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/changeme
      NEO4J_PLUGINS: '["apoc"]'
      # Allow APOC procedures (plugin is loaded per NEO4J_PLUGINS above).
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      # ADR-0017 backstop: cap any single transaction so a runaway public / MCP read
      # can't hang the server. Bounded public tools stay far under this; batched ETL
      # txs are short too. Overridable per-tx if a future bulk op needs longer.
      NEO4J_db_transaction_timeout: "60s"
      # Phase 2 memory: full proteome + STRING/GWAS/ClinVar + ~370MB of
      # embedding vectors. Heap 4G, pagecache 4G (06_data_vision.md, ADR-0008).
      NEO4J_server_memory_heap_initial__size: "2G"
      NEO4J_server_memory_heap_max__size: "4G"
      NEO4J_server_memory_pagecache_size: "4G"
    volumes:
      # Named volume, NOT a host bind mount. On macOS/arm64 + Docker Desktop
      # (VirtioFS), bind-mounting Neo4j's store directory triggers EDEADLK
      # ("Resource deadlock avoided") on store page reads after a Docker restart,
      # so Neo4j fails to open the database. A named volume lives inside the Linux
      # VM filesystem and is the configuration Neo4j recommends on Docker Desktop.
      # The graph is rebuilt deterministically by etl/run_pipeline.py from
      # data/raw/, so no source data is lost by this change.
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    container_name: omicgraph-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Inside the compose network Neo4j is reachable by service name.
      NEO4J_URI: bolt://neo4j:7687
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: omicgraph-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  # Neo4j store. Named volume (Linux-VM filesystem) avoids the macOS bind-mount
  # EDEADLK issue documented on the neo4j service above. Rebuild with the ETL
  # pipeline; wipe with `docker compose down -v` + re-run etl/run_pipeline.py.
  neo4j_data:
